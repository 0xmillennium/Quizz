name: Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  guard:
    name: Guard deployment ref
    runs-on: ubuntu-latest

    steps:
      - name: Ensure Pages deploys only from master
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF}" != "refs/heads/master" ]; then
            echo "::error::GitHub Pages deployment is allowed only from refs/heads/master. Current ref: ${GITHUB_REF}"
            exit 1
          fi

  build:
    name: Build MkDocs site
    runs-on: ubuntu-latest
    needs: guard
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.x"

      - name: Ensure ripgrep is available
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v rg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ripgrep
          fi

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-docs.txt

      - name: Documentation audits
        shell: bash
        run: |
          set -euo pipefail

          fail_if_match() {
            local description="$1"
            shift
            if rg -n "$@"; then
              echo "::error::Documentation audit failed: ${description}"
              exit 1
            fi
          }

          fail_if_match "unfinished documentation markers" 'TODO|FIXME|TBD|coming soon|placeholder' docs README.md mkdocs.yml
          fail_if_match "weak or fake secret examples" 'change[- ]?me|pass(word)?[[:digit:]]+|StrongPass(word)?[[:digit:]]+' docs README.md
          fail_if_match "hardcoded local port drift" 'localhost:8080|localhost:8081' docs README.md
          fail_if_match "phase-history language" 'Phase [0-9]|Phase 1|Phase 13|Phase 14' docs README.md

          legacy_docs="$(find . -maxdepth 2 -type f \( -name 'DOCKER.md' -o -name 'LOCAL_SETUP.md' -o -name 'ADMIN_BOOTSTRAP.md' -o -name 'DEMO_FIXTURES.md' -o -name 'ARCHITECTURE.md' -o -name 'FINAL_REQUIREMENTS_CHECKLIST.md' -o -name 'PHASE_SUMMARY.md' \))"
          if [ -n "${legacy_docs}" ]; then
            echo "${legacy_docs}"
            echo "::error::Documentation audit failed: legacy root documentation files found"
            exit 1
          fi

      - name: Build documentation
        run: mkdocs build --strict

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: site

  deploy:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
