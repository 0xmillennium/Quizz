name: Docs

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  docs:
    name: MkDocs and documentation audits
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.x"

      - name: Ensure ripgrep is available
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v rg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ripgrep
          fi

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-docs.txt

      - name: Build documentation
        run: mkdocs build --strict

      - name: Documentation audits
        shell: bash
        run: |
          set -euo pipefail

          fail_if_match() {
            local description="$1"
            shift
            if rg -n "$@"; then
              echo "::error::Documentation audit failed: ${description}"
              exit 1
            fi
          }

          fail_if_match "unfinished documentation markers" 'TODO|FIXME|TBD|coming soon|placeholder' docs README.md mkdocs.yml
          fail_if_match "weak or fake secret examples" 'change[- ]?me|pass(word)?[[:digit:]]+|StrongPass(word)?[[:digit:]]+' docs README.md
          fail_if_match "hardcoded local port drift" 'localhost:8080|localhost:8081' docs README.md
          fail_if_match "phase-history language" 'Phase [0-9]|Phase 1|Phase 13|Phase 14' docs README.md

          legacy_docs="$(find . -maxdepth 2 -type f \( -name 'DOCKER.md' -o -name 'LOCAL_SETUP.md' -o -name 'ADMIN_BOOTSTRAP.md' -o -name 'DEMO_FIXTURES.md' -o -name 'ARCHITECTURE.md' -o -name 'FINAL_REQUIREMENTS_CHECKLIST.md' -o -name 'PHASE_SUMMARY.md' \))"
          if [ -n "${legacy_docs}" ]; then
            echo "${legacy_docs}"
            echo "::error::Documentation audit failed: legacy root documentation files found"
            exit 1
          fi
