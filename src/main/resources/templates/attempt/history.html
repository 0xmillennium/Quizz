<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Attempt History - Quizz</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header th:replace="~{layout/fragments :: userNav}"></header>
<main>
    <div th:replace="~{layout/fragments :: flash}"></div>

    <h1>Attempt History</h1>

    <table>
        <thead>
        <tr>
            <th>Quiz</th>
            <th>Category</th>
            <th>Status</th>
            <th>Score</th>
            <th>Correct</th>
            <th>Started</th>
            <th>Submitted</th>
            <th>Result</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="attempt : ${history}">
            <td th:text="${attempt.quizTitle()}">Quiz</td>
            <td th:text="${attempt.categoryName()}">Category</td>
            <td th:text="${attempt.status()}">COMPLETED</td>
            <td th:text="${attempt.scorePercentage()} + '%'">80%</td>
            <td th:text="${attempt.correctCount()} + ' / ' + ${attempt.totalQuestions()}">4 / 5</td>
            <td th:text="${attempt.startedAt()}">Started</td>
            <td th:text="${attempt.submittedAt()} ?: '-'">Submitted</td>
            <td>
                <a th:if="${attempt.status() == 'COMPLETED' || attempt.status() == 'EXPIRED'}"
                   th:href="@{/attempts/{attemptId}/result(attemptId=${attempt.attemptId()})}">View</a>
            </td>
        </tr>
        </tbody>
    </table>

    <p><a th:href="@{/quizzes}">Back to quizzes</a></p>
</main>
</body>
</html>
