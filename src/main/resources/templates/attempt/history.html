<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{layout/fragments :: head('Attempt History - Quizz')}"></th:block>
</head>
<body class="app-shell">
<header th:replace="~{layout/fragments :: userNav}"></header>
<main class="page-container">
    <th:block th:replace="~{layout/fragments :: flash}"></th:block>

    <th:block th:replace="~{layout/fragments :: pageHeader('Attempt History', 'Review your attempts and continue any quiz that is still in progress.')}"></th:block>

    <th:block th:if="${#lists.isEmpty(history)}"
              th:replace="~{layout/fragments :: emptyState('No attempts yet', 'Start a quiz to see your history here.', 'Browse quizzes', @{/quizzes})}"></th:block>

    <div class="table-card" th:if="${!#lists.isEmpty(history)}">
        <div class="table-responsive">
            <table class="data-table">
                <thead>
                <tr>
                    <th>Quiz</th>
                    <th>Category</th>
                    <th>Status</th>
                    <th>Score</th>
                    <th>Started</th>
                    <th>Submitted / Abandoned</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="attempt : ${history}">
                    <td th:text="${attempt.quizTitle()}">Quiz</td>
                    <td th:text="${attempt.categoryName()}">Category</td>
                    <td class="history-status"><th:block th:replace="~{layout/fragments :: statusBadge(${attempt.status()}, ${attempt.completionReason()})}"></th:block></td>
                    <td>
                        <span th:if="${attempt.status() == 'COMPLETED'}" th:text="${attempt.scorePercentage()} + '%'">80%</span>
                        <span class="text-muted" th:if="${attempt.status() != 'COMPLETED'}">-</span>
                        <span class="text-muted" th:if="${attempt.status() == 'COMPLETED'}" th:text="' (' + ${attempt.correctCount()} + ' / ' + ${attempt.totalQuestions()} + ')'">(4 / 5)</span>
                    </td>
                    <td th:text="${attempt.startedAt()}">Started</td>
                    <td>
                        <span th:if="${attempt.submittedAt() != null}" th:text="${attempt.submittedAt()}">Submitted</span>
                        <span th:if="${attempt.abandonedAt() != null}" th:text="${attempt.abandonedAt()}">Abandoned</span>
                        <span class="text-muted" th:if="${attempt.submittedAt() == null and attempt.abandonedAt() == null}">-</span>
                    </td>
                    <td>
                        <a class="button button-secondary"
                           th:if="${attempt.status() == 'COMPLETED'}"
                           th:href="@{/attempts/{attemptId}/result(attemptId=${attempt.attemptId()})}">View result</a>
                        <a class="button button-primary"
                           th:if="${attempt.status() == 'IN_PROGRESS'}"
                           th:href="@{/attempts/{attemptId}(attemptId=${attempt.attemptId()})}">Continue</a>
                        <span class="text-muted" th:if="${attempt.status() == 'ABANDONED'}">No action</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <p class="mt-4"><a class="button button-secondary" th:href="@{/quizzes}">Back to quizzes</a></p>
</main>
</body>
</html>
