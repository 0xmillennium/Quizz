<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - Online Quiz</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main>
    <div th:replace="~{layout/fragments :: flash}"></div>

    <h1>Login</h1>

    <p th:if="${param.error}">Invalid email or password.</p>
    <p th:if="${param.logout}">You have been logged out.</p>

    <form th:action="@{/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div>
            <label for="email">Email</label>
            <input id="email" type="email" name="email" autocomplete="username" required>
        </div>

        <div>
            <label for="password">Password</label>
            <input id="password" type="password" name="password" autocomplete="current-password" required>
        </div>

        <button type="submit">Log in</button>
    </form>

    <p><a th:href="@{/register}">Create an account</a></p>
</main>
</body>
</html>
