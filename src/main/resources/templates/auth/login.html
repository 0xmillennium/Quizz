<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{layout/fragments :: head('Login - Quizz')}"></th:block>
</head>
<body class="auth-shell">
<header class="app-header">
    <div class="app-header__inner">
        <a class="brand" th:href="@{/quizzes}">Quizz</a>
    </div>
</header>
<main class="page-container">
    <th:block th:replace="~{layout/fragments :: flash}"></th:block>

    <section class="form-card auth-card">
        <header class="page-header">
            <p class="badge badge-primary">Quizz</p>
            <h1 class="page-title">Sign in to continue your learning</h1>
            <p class="page-subtitle">Pick up active attempts, review your results, and keep climbing the leaderboard.</p>
        </header>

        <p class="alert alert-error" th:if="${param.error}" role="alert">Invalid email or password.</p>
        <p class="alert alert-info" th:if="${param.logout}" role="status">You have been logged out.</p>

        <form th:action="@{/login}" method="post">
            <th:block th:replace="~{layout/fragments :: csrf}"></th:block>

            <div class="field">
                <label class="field-label" for="email">Email</label>
                <input id="email" type="email" name="email" autocomplete="username" required>
            </div>

            <div class="field">
                <label class="field-label" for="password">Password</label>
                <input id="password" type="password" name="password" autocomplete="current-password" required>
            </div>

            <div class="form-actions form-actions--between">
                <button class="button button-primary" type="submit">Log in</button>
                <a th:href="@{/register}">Create an account</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
