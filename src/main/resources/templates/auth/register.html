<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{layout/fragments :: head('Register - Quizz')}"></th:block>
</head>
<body class="auth-shell">
<header class="app-header">
    <div class="app-header__inner">
        <a class="brand" th:href="@{/quizzes}">Quizz</a>
    </div>
</header>
<main class="page-container">
    <th:block th:replace="~{layout/fragments :: flash}"></th:block>

    <section class="form-card auth-card">
        <header class="page-header">
            <p class="badge badge-primary">Quizz</p>
            <h1 class="page-title">Create your Quizz account</h1>
            <p class="page-subtitle">Join the student portal for timed quizzes, result history, and leaderboard progress.</p>
        </header>

        <form th:action="@{/register}" th:object="${registerRequest}" method="post">
            <th:block th:replace="~{layout/fragments :: csrf}"></th:block>

            <div class="field">
                <label class="field-label" for="fullName">Full name</label>
                <input id="fullName" type="text" th:field="*{fullName}" autocomplete="name" required>
                <p class="field-error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></p>
            </div>

            <div class="field">
                <label class="field-label" for="email">Email</label>
                <input id="email" type="email" th:field="*{email}" autocomplete="email" required>
                <p class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
            </div>

            <div class="field">
                <label class="field-label" for="password">Password</label>
                <input id="password" type="password" th:field="*{password}" autocomplete="new-password" required>
                <p class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
            </div>

            <div class="field">
                <label class="field-label" for="confirmPassword">Confirm password</label>
                <input id="confirmPassword" type="password" th:field="*{confirmPassword}" autocomplete="new-password" required>
                <p class="field-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></p>
            </div>

            <div class="form-actions form-actions--between">
                <button class="button button-primary" type="submit">Register</button>
                <a th:href="@{/login}">Already have an account?</a>
            </div>
        </form>
    </section>
</main>
</body>
</html>
