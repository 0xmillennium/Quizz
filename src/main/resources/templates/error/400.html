<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{layout/fragments :: head('Bad Request - Quizz')}"></th:block>
</head>
<body class="public-shell">
<main class="page-container error-page">
    <section class="card error-card">
        <span class="badge badge-warning">400</span>
        <h1 class="page-title mt-4">Bad Request</h1>
        <p th:text="${message ?: 'The request could not be processed.'}">The request could not be processed.</p>
        <a class="button button-primary" th:href="@{/quizzes}">Back to quizzes</a>
    </section>
</main>
</body>
</html>
