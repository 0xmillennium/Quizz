<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{layout/fragments :: head('Server Error - Quizz')}"></th:block>
</head>
<body class="public-shell">
<main class="page-container error-page">
    <section class="card error-card">
        <span class="badge badge-danger">500</span>
        <h1 class="page-title mt-4">Server Error</h1>
        <p th:text="${message ?: 'An unexpected error occurred.'}">An unexpected error occurred.</p>
        <a class="button button-primary" th:href="@{/quizzes}">Back to quizzes</a>
    </section>
</main>
</body>
</html>
