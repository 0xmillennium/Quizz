<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{layout/fragments :: head('Forbidden - Quizz')}"></th:block>
</head>
<body class="public-shell">
<main class="page-container error-page">
    <section class="card error-card">
        <span class="badge badge-danger">403</span>
        <h1 class="page-title mt-4">Forbidden</h1>
        <p th:text="${message ?: 'You do not have permission to access this page.'}">You do not have permission to access this page.</p>
        <a class="button button-primary" th:href="@{/login}">Go to login</a>
    </section>
</main>
</body>
</html>
