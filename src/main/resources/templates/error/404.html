<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{layout/fragments :: head('Not Found - Quizz')}"></th:block>
</head>
<body class="public-shell">
<main class="page-container error-page">
    <section class="card error-card">
        <span class="badge badge-muted">404</span>
        <h1 class="page-title mt-4">Not Found</h1>
        <p th:text="${message ?: 'The requested page could not be found.'}">The requested page could not be found.</p>
        <a class="button button-primary" th:href="@{/quizzes}">Back to quizzes</a>
    </section>
</main>
</body>
</html>
