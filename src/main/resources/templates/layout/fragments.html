<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}">Quizz</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</th:block>

<th:block th:fragment="adminHead(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}">Quizz Admin</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</th:block>

<header class="app-header" th:fragment="userNav">
    <div class="app-header__inner">
        <a class="brand" th:href="@{/quizzes}">Quizz</a>
        <nav class="nav-tabs" aria-label="User navigation">
            <a class="nav-link" th:href="@{/quizzes}">Quizzes</a>
            <a class="nav-link" th:href="@{/leaderboard}">Leaderboard</a>
            <a class="nav-link" th:href="@{/attempts/history}">History</a>
            <form class="nav-logout" th:action="@{/logout}" method="post">
                <th:block th:replace="~{layout/fragments :: csrf}"></th:block>
                <button class="button button-ghost" type="submit">Logout</button>
            </form>
        </nav>
    </div>
</header>

<aside class="admin-sidebar" th:fragment="adminNav">
    <a class="admin-sidebar__brand" th:href="@{/admin}">Quizz Admin</a>
    <nav class="admin-nav" aria-label="Admin navigation">
        <a class="admin-nav-link" th:href="@{/admin}">Dashboard</a>
        <a class="admin-nav-link" th:href="@{/admin/categories}">Categories</a>
        <a class="admin-nav-link" th:href="@{/admin/questions}">Questions</a>
        <a class="admin-nav-link" th:href="@{/admin/quizzes}">Quizzes</a>
        <a class="admin-nav-link" th:href="@{/admin/results}">Results</a>
        <a class="admin-nav-link" th:href="@{/leaderboard}">Leaderboard</a>
    </nav>
    <form class="nav-logout" th:action="@{/logout}" method="post">
        <th:block th:replace="~{layout/fragments :: csrf}"></th:block>
        <button class="button button-ghost" type="submit">Logout</button>
    </form>
</aside>

<div th:fragment="flash"
     th:if="${flashMessage != null}"
     th:class="'alert alert-' + ${flashMessage.type()}"
     th:text="${flashMessage.text()}"
     role="alert">
</div>

<header class="page-header" th:fragment="pageHeader(title, subtitle)">
    <h1 class="page-title" th:text="${title}">Page title</h1>
    <p class="page-subtitle" th:if="${subtitle != null and !#strings.isEmpty(subtitle)}" th:text="${subtitle}">Page subtitle</p>
</header>

<header class="page-header page-header--with-action" th:fragment="pageHeaderWithAction(title, subtitle, actionText, actionHref)">
    <div>
        <h1 class="page-title" th:text="${title}">Page title</h1>
        <p class="page-subtitle" th:if="${subtitle != null and !#strings.isEmpty(subtitle)}" th:text="${subtitle}">Page subtitle</p>
    </div>
    <a class="button button-primary"
       th:if="${actionText != null and actionHref != null}"
       th:href="${actionHref}"
       th:text="${actionText}">Action</a>
</header>

<span th:fragment="statusBadge(status, reason)"
      class="badge"
      th:class="${status == 'PUBLISHED' or status == 'ACTIVE' or (status == 'COMPLETED' and reason == 'MANUAL') ? 'badge badge-success' : ((status == 'IN_PROGRESS') or (status == 'COMPLETED' and reason == 'TIME_EXPIRED') ? 'badge badge-warning' : ((status == 'DANGER' or status == 'ERROR') ? 'badge badge-danger' : 'badge badge-muted'))}"
      th:text="${status == 'IN_PROGRESS' ? 'In progress' : (status == 'COMPLETED' and reason == 'MANUAL' ? 'Completed' : (status == 'COMPLETED' and reason == 'TIME_EXPIRED' ? 'Auto-submitted' : (status == 'ABANDONED' ? 'Abandoned' : (status == 'PUBLISHED' ? 'Published' : (status == 'DRAFT' ? 'Draft' : (status == 'ARCHIVED' ? 'Archived' : (status == 'ACTIVE' ? 'Active' : (status == 'INACTIVE' ? 'Inactive' : status))))))))}">
    Status
</span>

<section class="empty-state" th:fragment="emptyState(title, message, actionText, actionHref)">
    <h2 th:text="${title}">Nothing here yet</h2>
    <p th:text="${message}">No records found.</p>
    <a class="button button-primary"
       th:if="${actionText != null and actionHref != null}"
       th:href="${actionHref}"
       th:text="${actionText}">Action</a>
</section>

<input th:fragment="csrf"
       type="hidden"
       th:name="${_csrf.parameterName}"
       th:value="${_csrf.token}">
</body>
</html>
