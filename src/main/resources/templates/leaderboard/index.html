<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{layout/fragments :: head('Leaderboard - Quizz')}"></th:block>
    <script defer th:src="@{/js/leaderboard.js}"></script>
</head>
<body class="app-shell">
<header th:replace="~{layout/fragments :: userNav}"></header>
<main class="page-container">
    <th:block th:replace="~{layout/fragments :: flash}"></th:block>

    <th:block th:replace="~{layout/fragments :: pageHeader('Leaderboard', 'Celebrate top scores and compare completed quiz results.')}"></th:block>

    <form class="filter-bar filter-bar--grid" th:action="@{/leaderboard}" method="get" id="leaderboard-filter-form">
        <div class="field">
            <label class="field-label" for="quizId">Quiz</label>
            <select id="quizId" name="quizId">
                <option value="">All quizzes</option>
                <option th:each="quiz : ${quizzes}"
                        th:value="${quiz.id()}"
                        th:selected="${filter.quizId != null and filter.quizId == quiz.id()}"
                        th:text="${quiz.title()}">Quiz</option>
            </select>
        </div>

        <div class="field">
            <label class="field-label" for="categoryId">Category</label>
            <select id="categoryId" name="categoryId">
                <option value="">All categories</option>
                <option th:each="category : ${categories}"
                        th:value="${category.id()}"
                        th:selected="${filter.categoryId != null and filter.categoryId == category.id()}"
                        th:text="${category.name()}">Category</option>
            </select>
        </div>

        <div class="field">
            <label class="field-label" for="limit">Limit</label>
            <input id="limit"
                   type="number"
                   name="limit"
                   min="1"
                   max="100"
                   th:value="${leaderboard.limit()}">
        </div>

        <div class="form-actions">
            <button class="button button-secondary" type="submit">Apply</button>
            <a class="button button-ghost" th:href="@{/leaderboard}">Clear filters</a>
        </div>
    </form>

    <th:block th:if="${#lists.isEmpty(leaderboard.entries())}"
              th:replace="~{layout/fragments :: emptyState('No leaderboard entries yet', 'Complete a quiz to appear here.', null, null)}"></th:block>

    <section class="leaderboard-podium" th:if="${!#lists.isEmpty(leaderboard.entries())}" aria-label="Top leaderboard entries">
        <article class="leaderboard-card"
                 th:each="entry, stat : ${leaderboard.entries()}"
                 th:if="${stat.index < 3}"
                 th:classappend="${stat.index == 0} ? ' leaderboard-card--first' : ''">
            <span class="leaderboard-rank" th:text="'#' + ${entry.rankPosition()}">#1</span>
            <h2 th:text="${entry.userFullName()}">User</h2>
            <p class="score-pill"><strong th:text="${entry.scorePercentage()}">100</strong><span>%</span></p>
            <p class="text-muted mb-0" th:text="${entry.correctCount()} + ' / ' + ${entry.totalQuestions()} + ' on ' + ${entry.quizTitle()}">Quiz score</p>
        </article>
    </section>

    <div class="table-card" th:if="${!#lists.isEmpty(leaderboard.entries())}">
        <div class="table-responsive">
            <table class="data-table">
                <thead>
                <tr>
                    <th>Rank</th>
                    <th>User</th>
                    <th>Score</th>
                    <th>Correct / Total</th>
                    <th>Completed at</th>
                    <th>Quiz</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="entry : ${leaderboard.entries()}">
                    <td th:text="${entry.rankPosition()}">1</td>
                    <td th:text="${entry.userFullName()}">User</td>
                    <td th:text="${entry.scorePercentage()} + '%'">80%</td>
                    <td th:text="${entry.correctCount()} + ' / ' + ${entry.totalQuestions()}">4 / 5</td>
                    <td th:text="${entry.submittedAt()}">Submitted</td>
                    <td>
                        <span th:text="${entry.quizTitle()}">Quiz</span>
                        <span class="badge badge-muted" th:text="${entry.categoryName()}">Category</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>
