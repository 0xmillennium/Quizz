<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Create Category - Quizz Admin</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<header class="admin-header">
    <a th:href="@{/}">Quizz Admin</a>
</header>
<main>
    <div th:replace="~{layout/fragments :: flash}"></div>

    <h1>Create Category</h1>

    <form th:action="@{/admin/categories}" th:object="${categoryCreateRequest}" method="post">
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}">

        <div>
            <label for="name">Name</label>
            <input id="name" type="text" th:field="*{name}" maxlength="80" required>
            <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
        </div>

        <div>
            <label for="description">Description</label>
            <textarea id="description" th:field="*{description}" maxlength="500"></textarea>
            <p th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></p>
        </div>

        <button type="submit">Create category</button>
    </form>

    <p><a th:href="@{/admin/categories}">Back to categories</a></p>
</main>
</body>
</html>
