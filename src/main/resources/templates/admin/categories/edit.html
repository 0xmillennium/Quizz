<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{layout/fragments :: adminHead('Edit Category - Quizz Admin')}"></th:block>
</head>
<body>
<div class="admin-shell">
<aside th:replace="~{layout/fragments :: adminNav}"></aside>
<main class="admin-main">
    <div class="page-container admin-page-container">
    <th:block th:replace="~{layout/fragments :: flash}"></th:block>

    <th:block th:replace="~{layout/fragments :: pageHeader('Edit Category', 'Update category details.')}"></th:block>

    <form class="form-card" th:action="@{/admin/categories/{id}(id=${categoryId})}" th:object="${categoryUpdateRequest}" method="post">
        <th:block th:replace="~{layout/fragments :: csrf}"></th:block>

        <section class="admin-form-section">
            <div class="admin-form-section-header">
                <h2>Category details</h2>
                <p class="field-help">Changes affect how this category appears in admin question and quiz workflows.</p>
            </div>

            <div class="field">
                <label class="field-label" for="name">Name</label>
                <input id="name" type="text" th:field="*{name}" maxlength="80" required>
                <p class="field-help">Maximum 80 characters.</p>
                <p class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
            </div>

            <div class="field">
                <label class="field-label" for="description">Description</label>
                <textarea id="description" th:field="*{description}" maxlength="500"></textarea>
                <p class="field-help">Optional context for admins managing the catalog.</p>
                <p class="field-error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></p>
            </div>
        </section>

        <div class="form-actions">
            <button class="button button-primary" type="submit">Update category</button>
            <a class="button button-secondary" th:href="@{/admin/categories}">Cancel</a>
        </div>
    </form>
    </div>
</main>
</div>
</body>
</html>
