<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{layout/fragments :: adminHead('Categories - Quizz Admin')}"></th:block>
</head>
<body>
<div class="admin-shell">
<aside th:replace="~{layout/fragments :: adminNav}"></aside>
<main class="admin-main">
    <div class="page-container admin-page-container">
    <th:block th:replace="~{layout/fragments :: flash}"></th:block>

    <th:block th:replace="~{layout/fragments :: pageHeaderWithAction('Categories', 'Organize questions and quizzes by topic.', 'Create Category', @{/admin/categories/new})}"></th:block>

    <th:block th:if="${#lists.isEmpty(categories)}"
              th:replace="~{layout/fragments :: emptyState('No categories found', 'Create a category before adding questions and quizzes.', 'Create Category', @{/admin/categories/new})}"></th:block>

    <div class="table-card" th:if="${!#lists.isEmpty(categories)}">
        <div class="card-header">
            <h2 class="card-title">Category catalog</h2>
            <p class="card-subtitle">Active categories can be used by questions and quizzes.</p>
        </div>
        <div class="table-responsive">
            <table class="data-table">
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Description</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="category : ${categories}">
                    <td><strong th:text="${category.name()}">General</strong></td>
                    <td class="table-cell-muted" th:text="${category.description() ?: 'No description'}">Description</td>
                    <td>
                        <span class="badge badge-success" th:if="${category.active()}">Active</span>
                        <span class="badge badge-muted" th:if="${!category.active()}">Inactive</span>
                    </td>
                    <td>
                        <div class="admin-list-actions">
                            <a class="button button-secondary" th:href="@{/admin/categories/{id}/edit(id=${category.id()})}">Edit</a>

                            <form th:if="${category.active()}"
                                  th:action="@{/admin/categories/{id}/deactivate(id=${category.id()})}"
                                  method="post">
                                <th:block th:replace="~{layout/fragments :: csrf}"></th:block>
                                <button class="button button-danger" type="submit">Deactivate</button>
                            </form>

                            <form th:if="${!category.active()}"
                                  th:action="@{/admin/categories/{id}/activate(id=${category.id()})}"
                                  method="post">
                                <th:block th:replace="~{layout/fragments :: csrf}"></th:block>
                                <button class="button button-secondary" type="submit">Activate</button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
    </div>
</main>
</div>
</body>
</html>
