<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Categories - Quizz Admin</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<header th:replace="~{layout/fragments :: adminNav}"></header>
<main>
    <div th:replace="~{layout/fragments :: flash}"></div>

    <h1>Categories</h1>
    <p><a th:href="@{/admin/categories/new}">Create category</a></p>

    <p th:if="${#lists.isEmpty(categories)}">No categories found.</p>

    <table th:if="${!#lists.isEmpty(categories)}">
        <thead>
        <tr>
            <th>Name</th>
            <th>Description</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="category : ${categories}">
            <td th:text="${category.name()}">General</td>
            <td th:text="${category.description() ?: ''}">Description</td>
            <td th:text="${category.active() ? 'Active' : 'Inactive'}">Active</td>
            <td>
                <a th:href="@{/admin/categories/{id}/edit(id=${category.id()})}">Edit</a>

                <form th:if="${category.active()}"
                      th:action="@{/admin/categories/{id}/deactivate(id=${category.id()})}"
                      method="post">
                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}">
                    <button type="submit">Deactivate</button>
                </form>

                <form th:if="${!category.active()}"
                      th:action="@{/admin/categories/{id}/activate(id=${category.id()})}"
                      method="post">
                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}">
                    <button type="submit">Activate</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
