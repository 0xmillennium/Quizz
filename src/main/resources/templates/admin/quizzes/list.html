<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quizzes - Quizz Admin</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<header th:replace="~{layout/fragments :: adminNav}"></header>
<main>
    <div th:replace="~{layout/fragments :: flash}"></div>

    <h1>Quizzes</h1>
    <p><a th:href="@{/admin/quizzes/new}">Create quiz</a></p>

    <p th:if="${#lists.isEmpty(quizzes)}">No quizzes found.</p>

    <table th:if="${!#lists.isEmpty(quizzes)}">
        <thead>
        <tr>
            <th>Title</th>
            <th>Category</th>
            <th>Duration</th>
            <th>Status</th>
            <th>Question Count</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="quiz : ${quizzes}">
            <td th:text="${quiz.title()}">Quiz title</td>
            <td th:text="${quiz.categoryName()}">Category</td>
            <td th:text="${quiz.durationMinutes()} + ' minutes'">30 minutes</td>
            <td th:text="${quiz.status()}">DRAFT</td>
            <td th:text="${quiz.questionCount()}">5</td>
            <td>
                <a th:href="@{/admin/quizzes/{id}(id=${quiz.id()})}">Detail</a>
                <a th:if="${quiz.status() == 'DRAFT'}"
                   th:href="@{/admin/quizzes/{id}/edit(id=${quiz.id()})}">Edit</a>

                <form th:if="${quiz.status() == 'DRAFT'}"
                      th:action="@{/admin/quizzes/{id}/publish(id=${quiz.id()})}"
                      method="post">
                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}">
                    <button type="submit">Publish</button>
                </form>

                <form th:if="${quiz.status() != 'ARCHIVED'}"
                      th:action="@{/admin/quizzes/{id}/archive(id=${quiz.id()})}"
                      method="post">
                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}">
                    <button type="submit">Archive</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
