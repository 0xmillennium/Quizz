<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Create Quiz - Quizz Admin</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<header class="admin-header">
    <a th:href="@{/}">Quizz Admin</a>
</header>
<main>
    <div th:replace="~{layout/fragments :: flash}"></div>

    <h1>Create Quiz</h1>

    <form th:action="@{/admin/quizzes}"
          th:object="${quizCreateRequest}"
          method="post"
          data-quiz-form>
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}">

        <div>
            <label for="title">Title</label>
            <input id="title" type="text" th:field="*{title}" maxlength="150" required>
            <p th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></p>
        </div>

        <div>
            <label for="description">Description</label>
            <textarea id="description" th:field="*{description}" maxlength="1000"></textarea>
            <p th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></p>
        </div>

        <div>
            <label for="categoryId">Category</label>
            <select id="categoryId" th:field="*{categoryId}" required data-quiz-category>
                <option value="">Select category</option>
                <option th:each="category : ${categories}"
                        th:value="${category.id()}"
                        th:text="${category.name()}">Category</option>
            </select>
            <p th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}"></p>
        </div>

        <div>
            <label for="durationMinutes">Duration minutes</label>
            <input id="durationMinutes" type="number" th:field="*{durationMinutes}" min="1" max="180" required>
            <p th:if="${#fields.hasErrors('durationMinutes')}" th:errors="*{durationMinutes}"></p>
        </div>

        <fieldset>
            <legend>Questions</legend>
            <p th:if="${#fields.hasErrors('questionIds')}" th:errors="*{questionIds}"></p>

            <p th:if="${#lists.isEmpty(questions)}">No active questions found.</p>
            <div th:each="question : ${questions}"
                 th:attr="data-category-id=${question.categoryId()}"
                 data-question-row>
                <label>
                    <input type="checkbox"
                           name="questionIds"
                           th:value="${question.id()}"
                           th:checked="${quizCreateRequest.questionIds != null and #lists.contains(quizCreateRequest.questionIds, question.id())}">
                    <span th:text="${question.text()}">Question text</span>
                </label>
                <span th:text="${question.categoryName()}">Category</span>
            </div>
        </fieldset>

        <button type="submit">Create quiz</button>
    </form>

    <p><a th:href="@{/admin/quizzes}">Back to quizzes</a></p>
</main>
<script th:src="@{/js/admin-quiz-form.js}"></script>
</body>
</html>
