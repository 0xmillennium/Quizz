<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{layout/fragments :: adminHead('Create Question - Quizz Admin')}"></th:block>
</head>
<body>
<div class="admin-shell">
<aside th:replace="~{layout/fragments :: adminNav}"></aside>
<main class="admin-main">
    <div class="page-container admin-page-container">
    <th:block th:replace="~{layout/fragments :: flash}"></th:block>

    <th:block th:replace="~{layout/fragments :: pageHeader('Create Question', 'Add a reusable question and mark exactly one correct answer option.')}"></th:block>

    <form class="form-card"
          th:action="@{/admin/questions}"
          th:object="${questionCreateRequest}"
          method="post"
          data-question-form>
        <th:block th:replace="~{layout/fragments :: csrf}"></th:block>

        <section class="admin-form-section">
            <div class="admin-form-section-header">
                <h2>Question details</h2>
                <p class="field-help">Choose the category used to group this question into quiz pools.</p>
            </div>

            <div class="field">
                <label class="field-label" for="categoryId">Category</label>
                <select id="categoryId" th:field="*{categoryId}" required>
                    <option value="">Select category</option>
                    <option th:each="category : ${categories}"
                            th:value="${category.id()}"
                            th:text="${category.name()}">Category</option>
                </select>
                <p class="field-error" th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}"></p>
            </div>

            <div class="field">
                <label class="field-label" for="text">Question text</label>
                <textarea id="text" th:field="*{text}" maxlength="1000" required></textarea>
                <p class="field-help">Keep the wording complete enough to stand on its own in randomized attempts.</p>
                <p class="field-error" th:if="${#fields.hasErrors('text')}" th:errors="*{text}"></p>
            </div>
        </section>

        <section class="admin-form-section">
            <div class="admin-form-section-header">
                <h2>Answer options</h2>
                <p class="field-help">At least two options are required. Exactly one option must be marked correct.</p>
            </div>
            <p class="field-error" th:if="${#fields.hasErrors('options')}" th:errors="*{options}"></p>

            <div data-options-container>
                <div class="option-row" th:each="option, stat : *{options}" th:classappend="${option.correct} ? ' option-row-correct' : ''" data-option-row>
                    <div class="option-row__field">
                        <label class="field-label" th:for="${'options' + stat.index + '.text'}" th:text="${'Option ' + (stat.index + 1)}">Option 1</label>
                        <input th:id="${'options' + stat.index + '.text'}"
                               type="text"
                               th:field="*{options[__${stat.index}__].text}"
                               maxlength="500"
                               required>
                    </div>
                    <label class="checkbox-card option-row__correct" th:for="${'options' + stat.index + '.correct'}">
                        <input type="checkbox"
                               th:id="${'options' + stat.index + '.correct'}"
                               th:name="${'options[' + stat.index + '].correct'}"
                               th:checked="${option.correct}"
                               data-correct-option>
                        Correct answer
                    </label>
                    <button class="button button-ghost option-row__remove" type="button" data-remove-option>Remove</button>
                    <p class="field-error"
                       th:if="${#fields.hasErrors('options[' + stat.index + '].text')}"
                       th:errors="*{options[__${stat.index}__].text}"></p>
                </div>
            </div>

            <button class="button button-secondary mt-4" type="button" data-add-option>Add option</button>
        </section>

        <div class="form-actions">
            <button class="button button-primary" type="submit">Create question</button>
            <a class="button button-secondary" th:href="@{/admin/questions}">Cancel</a>
        </div>
    </form>
    </div>
</main>
</div>
<script th:src="@{/js/admin-question-form.js}"></script>
</body>
</html>
