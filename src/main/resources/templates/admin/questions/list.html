<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Questions - Quizz Admin</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<header th:replace="~{layout/fragments :: adminNav}"></header>
<main>
    <div th:replace="~{layout/fragments :: flash}"></div>

    <h1>Questions</h1>
    <p><a th:href="@{/admin/questions/new}">Create question</a></p>

    <p th:if="${#lists.isEmpty(questions)}">No questions found.</p>

    <table th:if="${!#lists.isEmpty(questions)}">
        <thead>
        <tr>
            <th>Text</th>
            <th>Category</th>
            <th>Status</th>
            <th>Options</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="question : ${questions}">
            <td th:text="${question.text()}">Question text</td>
            <td th:text="${question.categoryName()}">Category</td>
            <td th:text="${question.status()}">ACTIVE</td>
            <td th:text="${question.optionCount()}">4</td>
            <td>
                <a th:href="@{/admin/questions/{id}/edit(id=${question.id()})}">Edit</a>

                <form th:if="${question.status() == 'ACTIVE'}"
                      th:action="@{/admin/questions/{id}/delete(id=${question.id()})}"
                      method="post">
                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}">
                    <button type="submit">Archive</button>
                </form>

                <form th:if="${question.status() == 'ARCHIVED'}"
                      th:action="@{/admin/questions/{id}/restore(id=${question.id()})}"
                      method="post">
                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}">
                    <button type="submit">Restore</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
