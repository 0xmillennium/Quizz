<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{layout/fragments :: adminHead('Questions - Quizz Admin')}"></th:block>
</head>
<body>
<div class="admin-shell">
<aside th:replace="~{layout/fragments :: adminNav}"></aside>
<main class="admin-main">
    <div class="page-container admin-page-container">
    <th:block th:replace="~{layout/fragments :: flash}"></th:block>

    <th:block th:replace="~{layout/fragments :: pageHeaderWithAction('Questions', 'Manage the reusable question bank used by randomized quiz pools.', 'Create Question', @{/admin/questions/new})}"></th:block>

    <div class="toolbar">
        <span class="badge badge-primary">Reusable bank</span>
        <span class="text-muted">Archived questions remain available for reporting history but are not used for new quiz pools.</span>
    </div>

    <th:block th:if="${#lists.isEmpty(questions)}"
              th:replace="~{layout/fragments :: emptyState('No questions found', 'Create questions before building quiz pools.', 'Create Question', @{/admin/questions/new})}"></th:block>

    <div class="table-card" th:if="${!#lists.isEmpty(questions)}">
        <div class="card-header">
            <h2 class="card-title">Question bank</h2>
            <p class="card-subtitle">Question text, category, status, and answer option count.</p>
        </div>
        <div class="table-responsive">
            <table class="data-table">
                <thead>
                <tr>
                    <th>Question text</th>
                    <th>Category</th>
                    <th>Status</th>
                    <th>Options</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="question : ${questions}">
                    <td class="table-cell-main" th:text="${question.text()}">Question text</td>
                    <td><span class="badge badge-primary" th:text="${question.categoryName()}">Category</span></td>
                    <td><th:block th:replace="~{layout/fragments :: statusBadge(${question.status()}, null)}"></th:block></td>
                    <td><span th:text="${question.optionCount()}">4</span> options</td>
                    <td>
                        <div class="admin-list-actions">
                            <a class="button button-secondary" th:href="@{/admin/questions/{id}/edit(id=${question.id()})}">Edit</a>

                            <form th:if="${question.status() == 'ACTIVE'}"
                                  th:action="@{/admin/questions/{id}/delete(id=${question.id()})}"
                                  method="post">
                                <th:block th:replace="~{layout/fragments :: csrf}"></th:block>
                                <button class="button button-danger" type="submit">Archive</button>
                            </form>

                            <form th:if="${question.status() == 'ARCHIVED'}"
                                  th:action="@{/admin/questions/{id}/restore(id=${question.id()})}"
                                  method="post">
                                <th:block th:replace="~{layout/fragments :: csrf}"></th:block>
                                <button class="button button-secondary" type="submit">Restore</button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
    </div>
</main>
</div>
</body>
</html>
