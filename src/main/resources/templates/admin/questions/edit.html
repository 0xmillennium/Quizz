<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit Question - Quizz Admin</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
<header class="admin-header">
    <a th:href="@{/}">Quizz Admin</a>
</header>
<main>
    <div th:replace="~{layout/fragments :: flash}"></div>

    <h1>Edit Question</h1>

    <form th:action="@{/admin/questions/{id}(id=${questionId})}"
          th:object="${questionUpdateRequest}"
          method="post"
          data-question-form>
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}">

        <div>
            <label for="categoryId">Category</label>
            <select id="categoryId" th:field="*{categoryId}" required>
                <option value="">Select category</option>
                <option th:each="category : ${categories}"
                        th:value="${category.id()}"
                        th:text="${category.name()}">Category</option>
            </select>
            <p th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}"></p>
        </div>

        <div>
            <label for="text">Question text</label>
            <textarea id="text" th:field="*{text}" maxlength="1000" required></textarea>
            <p th:if="${#fields.hasErrors('text')}" th:errors="*{text}"></p>
        </div>

        <div>
            <h2>Answer options</h2>
            <p th:if="${#fields.hasErrors('options')}" th:errors="*{options}"></p>

            <div data-options-container>
                <div th:each="option, stat : *{options}" data-option-row>
                    <label th:for="${'options' + stat.index + '.text'}">Option</label>
                    <input th:id="${'options' + stat.index + '.text'}"
                           type="text"
                           th:field="*{options[__${stat.index}__].text}"
                           maxlength="500"
                           required>
                    <label>
                        <input type="checkbox"
                               th:name="${'options[' + stat.index + '].correct'}"
                               th:checked="${option.correct}">
                        Correct
                    </label>
                    <button type="button" data-remove-option>Remove</button>
                    <p th:if="${#fields.hasErrors('options[' + stat.index + '].text')}"
                       th:errors="*{options[__${stat.index}__].text}"></p>
                </div>
            </div>

            <button type="button" data-add-option>Add option</button>
        </div>

        <button type="submit">Update question</button>
    </form>

    <p><a th:href="@{/admin/questions}">Back to questions</a></p>
</main>
<script th:src="@{/js/admin-question-form.js}"></script>
</body>
</html>
