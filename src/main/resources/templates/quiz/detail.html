<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${quiz.title()} + ' - Quizz'">Quiz - Quizz</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header th:replace="~{layout/fragments :: userNav}"></header>
<main>
    <div th:replace="~{layout/fragments :: flash}"></div>

    <h1 th:text="${quiz.title()}">Quiz title</h1>
    <p th:if="${quiz.description() != null}" th:text="${quiz.description()}">Description</p>

    <dl>
        <dt>Category</dt>
        <dd th:text="${quiz.categoryName()}">Category</dd>
        <dt>Duration</dt>
        <dd th:text="${quiz.durationMinutes()} + ' minutes'">30 minutes</dd>
        <dt>Question count</dt>
        <dd th:text="${quiz.questionCount()}">5</dd>
    </dl>

    <h2>Questions</h2>
    <ol>
        <li th:each="question : ${quiz.questions()}"
            th:text="${question.text()}">Question text</li>
    </ol>

    <section th:if="${attemptState.hasActiveAttempt()}">
        <h2>Active attempt</h2>
        <p>
            Started <span th:text="${attemptState.startedAt()}">Started</span>,
            expires <span th:text="${attemptState.expiresAt()}">Expires</span>
        </p>
        <a th:href="@{/attempts/{attemptId}(attemptId=${attemptState.activeAttemptId()})}">Continue</a>
        <form th:action="@{/attempts/{attemptId}/restart(attemptId=${attemptState.activeAttemptId()})}" method="post">
            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}">
            <button type="submit">Restart</button>
        </form>
    </section>

    <section th:if="${attemptState.hasAutoSubmittedAttempt()}">
        <p>Your previous attempt was automatically submitted because time expired.</p>
        <p>
            <a th:href="@{/attempts/{attemptId}/result(attemptId=${attemptState.autoSubmittedAttemptId()})}">View Result</a>
        </p>
    </section>

    <form th:if="${!attemptState.hasActiveAttempt()}" th:action="@{/attempts/start}" method="post">
        <input type="hidden" name="quizId" th:value="${quiz.id()}">
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}">
        <button type="submit">Start Quiz</button>
    </form>

    <p><a th:href="@{/quizzes}">Back to quizzes</a></p>
</main>
</body>
</html>
